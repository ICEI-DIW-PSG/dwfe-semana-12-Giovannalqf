<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Funcionários</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>Cadastro de Funcionários</h1>

        <div class="formulario">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Digite o nome">

            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="Digite o e-mail">

            <label for="cargo">Cargo</label>
            <input type="text" id="cargo" placeholder="Digite o cargo">

            <label for="departamento">Departamento</label>
            <input type="text" id="departamento" placeholder="Digite o departamento">

            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Digite a senha">

            <button id="btnCadastrar">Cadastrar Funcionário</button>
        </div>

        <div class="quantidade">
            <h2>Total de Funcionários: <span id="totalFuncionarios">0</span></h2>
        </div>

        <div id="listaFuncionarios"></div>

    </div>
    <script src="script.js"></script>
</body>
</html>
